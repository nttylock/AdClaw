# Build AdClaw Docker image and push to Docker Hub on release or version tag.
# Tags: <version>, latest
name: Docker Build and Push

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v1.0.0)"
        required: true
        type: string

env:
  IMAGE: nttylock/adclaw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            docker.io/${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
            docker.io/${{ env.IMAGE }}:latest
          build-args: |
            ADCLAW_ENABLED_CHANNELS=discord,dingtalk,feishu,qq,console,telegram
          cache-from: type=gha
          cache-to: type=gha,mode=max
