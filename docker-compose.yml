version: "3.8"

services:
  adclaw:
    image: nttylock/adclaw:latest
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: adclaw
    restart: unless-stopped
    ports:
      - "${ADCLAW_PORT:-8088}:8088"
    volumes:
      - adclaw-data:/app/working
      - adclaw-secret:/app/working.secret
    environment:
      # Channels: all enabled by default (override to limit)
      - ADCLAW_ENABLED_CHANNELS=discord,dingtalk,feishu,qq,console,telegram
      # Citedy API key for MCP tools and skills
      - CITEDY_API_KEY=${CITEDY_API_KEY:-}
      # Telegram bot token (get from @BotFather)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Optional: GitHub token for skill hub (avoids rate limits)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Optional: Tavily search API key
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      # Log level (DEBUG, INFO, WARNING, ERROR)
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

volumes:
  adclaw-data:
    driver: local
  adclaw-secret:
    driver: local
